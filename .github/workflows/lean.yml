name: CI

on:
  push:
  pull_request:

jobs:
  lean-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ">=3.10"

      - name: Lean CI
        uses: leanprover/lean-action@v1
        with:
          auto-config: true

      - name: Lean test targets
        run: |
          lake build
          lake build AtpLinterTest

      - name: Python unit tests
        run: python3 -m unittest discover -s runner_tests -p "*.py"

      - name: Python lint (ruff)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ruff==0.11.10
          ruff check .
